version: '3.8'

services:
  # ==========================================
  # 数据库服务
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: campus-order-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password_change_this}
      MYSQL_DATABASE: campus_order
      MYSQL_USER: ${DB_USER:-campus_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password_change_this}
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/conf:/etc/mysql/conf.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - campus-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis服务
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: campus-order-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password_change_this} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - campus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==========================================
  # 应用服务
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campus-order-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9090}:9090"
    environment:
      # 激活的配置文件
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      
      # 数据库配置
      DB_URL: jdbc:mysql://mysql:3306/campus_order?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME:-campus_user}
      DB_PASSWORD: ${DB_PASSWORD:-password_change_this}
      
      # Redis配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password_change_this}
      
      # 支付宝配置
      ALIPAY_APP_ID: ${ALIPAY_APP_ID}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY}
      ALIPAY_NOTIFY_URL: ${ALIPAY_NOTIFY_URL}
      ALIPAY_RETURN_URL: ${ALIPAY_RETURN_URL}
      ALIPAY_SANDBOX: ${ALIPAY_SANDBOX:-false}
      
      # 微信支付配置
      WECHAT_PAY_APP_ID: ${WECHAT_PAY_APP_ID}
      WECHAT_PAY_MCH_ID: ${WECHAT_PAY_MCH_ID}
      WECHAT_PAY_API_V3_KEY: ${WECHAT_PAY_API_V3_KEY}
      WECHAT_PAY_MERCHANT_SERIAL: ${WECHAT_PAY_MERCHANT_SERIAL}
      WECHAT_PAY_PRIVATE_KEY_PATH: ${WECHAT_PAY_PRIVATE_KEY_PATH}
      WECHAT_PAY_NOTIFY_URL: ${WECHAT_PAY_NOTIFY_URL}
      
      # 文件上传配置
      FILE_UPLOAD_DIR: /app/uploads
      FILE_ACCESS_URL: ${FILE_ACCESS_URL}
      FILE_MAX_SIZE: 10485760
      
      # 日志配置
      LOG_FILE: /var/log/campus-order/app.log
      
      # 时区
      TZ: Asia/Shanghai
    volumes:
      - app-uploads:/app/uploads
      - app-logs:/var/log/campus-order
      - ./docker/app/config:/app/config:ro
    networks:
      - campus-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # Nginx反向代理（可选）
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: campus-order-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - campus-network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ==========================================
# 数据卷
# ==========================================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  app-uploads:
    driver: local
  app-logs:
    driver: local
  nginx-logs:
    driver: local

# ==========================================
# 网络
# ==========================================
networks:
  campus-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
