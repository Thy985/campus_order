  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        使用Bearer Token进行认证。
        
        在请求头中添加：
        ```
        Authorization: Bearer {token}
        ```
        
        Token通过登录接口获取，有效期为30天。
