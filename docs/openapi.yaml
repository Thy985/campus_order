openapi: 3.0.3
info:
  title: 校园点餐管理系统 API
  description: |
    校园点餐管理系统的RESTful API文档，基于OpenAPI 3.0.3规范。
    
    ## 认证方式
    所有需要认证的接口使用Bearer Token认证，在请求头中添加：
    ```
    Authorization: Bearer {token}
    ```
    
    ## 响应格式
    所有接口统一返回格式：
    ```json
    {
      "code": 200,
      "message": "success",
      "data": {},
      "timestamp": 1704067200000
    }
    ```
    
    ## 错误码说明
    - 200: 成功
    - 400: 请求参数错误
    - 401: 未认证或认证失败
    - 403: 无权限
    - 404: 资源不存在
    - 500: 服务器内部错误
    
    ## 订单状态说明
    | 状态值 | 状态名 | 说明 |
    |--------|--------|------|
    | 1 | 待支付 | 订单已创建，等待支付 |
    | 2 | 待接单 | 已支付，等待商家接单 |
    | 3 | 制作中 | 商家已接单，正在制作 |
    | 4 | 待取餐 | 制作完成，等待用户取餐 |
    | 5 | 已完成 | 订单已完成 |
    | 6 | 已取消 | 订单已取消 |
    | 7 | 已拒绝 | 商家拒绝接单 |
    
    ## SPA Fallback
    后端支持SPA（单页应用）Fallback配置：
    - 所有非API路径的请求（如 `/dashboard`, `/orders` 等）将返回 `index.html`
    - 这使得前端路由可以直接访问，无需配置Nginx重写规则
    - API路径（以 `/api/` 开头）不受影响，正常返回JSON响应
    - 静态资源文件（如 `/files/**`）直接返回文件内容
  version: 1.0.0
  contact:
    name: 校园点餐管理系统开发团队
    email: contact@campus-order.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  x-apifox:
    logo: https://cdn.apifox.com/logo.png
    description: |
      ## 测试环境配置
      
      ### 测试账号
      | 角色 | 手机号 | 密码 |
      |------|--------|------|
      | 管理员 | 13800000001 | 123456 |
      | 商家1 | 13800000002 | 123456 |
      | 商家2 | 13800000003 | 123456 |
      | 学生1 | 13800000011 | 123456 |
      | 学生2 | 13800000012 | 123456 |
      | 学生3 | 13800000013 | 123456 |
      
      ### 认证流程
      1. 调用 `/api/auth/login` 获取token
      2. 在后续请求头中添加 `Authorization: Bearer {token}`
      
      ### 注意事项
      - Token有效期为30天
      - 部分接口需要特定角色权限
      - 支付接口需要订单处于正确状态

servers:
  - url: http://localhost:9090
    description: 开发环境
  - url: https://test-api.campus-order.com
    description: 测试环境
  - url: https://api.campus-order.com
    description: 生产环境

tags:
  - name: 认证服务
    description: 用户注册、登录、认证相关接口
  - name: 用户服务
    description: 用户信息管理相关接口
  - name: 商家服务
    description: 商家信息查询相关接口
  - name: 商品服务
    description: 商品信息查询相关接口
  - name: 订单服务
    description: 订单管理相关接口
  - name: 支付服务
    description: 支付相关接口
  - name: 地址服务
    description: 收货地址管理相关接口
  - name: 评价服务
    description: 评价管理相关接口
  - name: 通知服务
    description: 消息通知相关接口
  - name: 文件服务
    description: 文件上传下载相关接口
  - name: 优惠券服务
    description: 优惠券领取和使用相关接口
  - name: 商家端
    description: 商家后台管理相关接口
  - name: 管理员端
    description: 管理员后台相关接口

paths:
  # ==================== 认证服务 ====================
  /api/auth/register:
    post:
      tags:
        - 认证服务
      summary: 用户注册
      description: |
        使用手机号和验证码注册新用户。
        
        **前置条件**：需要先调用 `/api/auth/verify-code` 接口获取验证码。
        
        **测试说明**：
        - 验证码有效期为5分钟
        - 测试环境验证码会打印在后端控制台日志中
        - 示例中的验证码 `123456` 仅作格式参考，实际使用需获取真实验证码
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              phone: "13800138000"
              password: "123456"
              nickname: "张三"
              verifyCode: "请先调用verify-code接口获取"
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: |
            请求参数错误或业务异常
            
            **业务错误码**：
            - `20007`: 验证码错误
            - `20008`: 验证码已过期
            - `20004`: 手机号已注册
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                verifyCodeExpired:
                  summary: 验证码已过期
                  value:
                    code: 20008
                    message: "验证码已过期"
                    data: null
                    timestamp: 1771830582058
                verifyCodeError:
                  summary: 验证码错误
                  value:
                    code: 20007
                    message: "验证码错误"
                    data: null
                    timestamp: 1771830582058
                phoneExist:
                  summary: 手机号已注册
                  value:
                    code: 20004
                    message: "手机号已注册"
                    data: null
                    timestamp: 1771830582058

  /api/auth/login:
    post:
      tags:
        - 认证服务
      summary: 用户登录
      description: |
        使用手机号和密码登录。
        
        **测试账号**：
        | 角色 | 手机号 | 密码 | 说明 |
        |------|--------|------|------|
        | 管理员 | 13800000001 | 123456 | 系统管理员 |
        | 商家1 | 13800000002 | 123456 | 商家ID=1 |
        | 商家2 | 13800000003 | 123456 | 商家ID=2 |
        | 学生1 | 13800000011 | 123456 | 普通用户 |
        | 学生2 | 13800000012 | 123456 | 普通用户 |
        
        **Apifox自动化说明**：
        此接口已配置后置操作，登录成功后会自动提取Token并设置到Bearer Auth中，后续请求无需手动设置。
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              admin:
                summary: 管理员登录
                value:
                  phone: "13800000001"
                  password: "123456"
              merchant:
                summary: 商家登录
                value:
                  phone: "13800000002"
                  password: "123456"
              student:
                summary: 学生登录
                value:
                  phone: "13800000011"
                  password: "123456"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: 认证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-apifox:
        afterScript: |
          // 登录成功后自动提取Token并设置到Bearer Auth
          const response = pm.response.json();
          if (response.code === 200 && response.data && response.data.token) {
            const token = response.data.token;
            // 设置到环境变量
            pm.environment.set("token", token);
            // 设置到Bearer Auth（自动应用到后续请求）
            pm.request.auth = {
              type: "bearer",
              bearer: {
                token: token
              }
            };
            console.log("✅ Token已自动提取并设置: " + token.substring(0, 30) + "...");
          } else {
            console.log("❌ 登录失败，未获取到Token");
          }

  /api/auth/logout:
    post:
      tags:
        - 认证服务
      summary: 退出登录
      description: |
        退出当前登录状态。
        
        **Apifox自动化说明**：
        此接口已配置后置操作，退出成功后会自动清除Token。
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 退出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: 未认证或Token已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                message: "未登录或登录已过期"
                data: null
                timestamp: 1704067200000
      x-apifox:
        afterScript: |
          // 退出成功后清除Token
          pm.environment.unset("token");
          pm.request.auth = null;
          console.log("✅ Token已清除");

  /api/auth/refresh:
    get:
      tags:
        - 认证服务
      summary: 刷新Token
      description: |
        刷新当前Token有效期。
        
        **Apifox自动化说明**：
        此接口已配置后置操作，刷新成功后会自动更新Token。
      operationId: refreshToken
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-apifox:
        afterScript: |
          // 刷新成功后更新Token
          const response = pm.response.json();
          if (response.code === 200 && response.data && response.data.token) {
            const token = response.data.token;
            pm.environment.set("token", token);
            pm.request.auth = {
              type: "bearer",
              bearer: {
                token: token
              }
            };
            console.log("✅ Token已刷新并更新: " + token.substring(0, 30) + "...");
          }

  /api/auth/verify-code:
    post:
      tags:
        - 认证服务
      summary: 获取验证码
      description: |
        发送验证码到指定手机号或邮箱。
        
        **验证码发送规则**：
        - 手机号：开发环境直接返回验证码
        - 邮箱：真实发送邮件（开发环境也会返回验证码方便测试）
        
        **验证码有效期**：5分钟
      operationId: getVerifyCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: 手机号（选填，与email二选一）
                  example: "13800138000"
                email:
                  type: string
                  description: 邮箱（选填，与phone二选一）
                  example: "test@campus.edu"
            example:
              phone: "13800138000"
      responses:
        '200':
          description: 验证码已发送
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "验证码已发送（开发环境/手机号直接返回）"
                  data:
                    type: object
                    properties:
                      target:
                        type: string
                        description: 目标（手机号或邮箱）
                        example: "13800138000"
                      targetType:
                        type: string
                        description: 目标类型
                        example: "手机号"
                      verifyCode:
                        type: string
                        description: 验证码（开发环境或手机号时返回）
                        example: "123456"
                      expireSeconds:
                        type: integer
                        description: 过期时间（秒）
                        example: 300
                  timestamp:
                    type: integer
                    example: 1771830582058

  # ==================== 忘记密码 ====================
  /api/auth/forgot-password:
    post:
      tags:
        - 认证服务
      summary: 忘记密码
      description: |
        通过验证码重置密码。
        
        **流程**：
        1. 先调用获取验证码接口获取验证码
        2. 使用验证码重置密码
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - verifyCode
                - newPassword
              properties:
                email:
                  type: string
                  description: 注册邮箱
                  example: "student01@campus.edu"
                verifyCode:
                  type: string
                  description: 验证码
                  example: "123456"
                newPassword:
                  type: string
                  description: 新密码
                  example: "newpassword123"
            example:
              email: "student01@campus.edu"
              verifyCode: "123456"
              newPassword: "newpassword123"
      responses:
        '200':
          description: 密码重置成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: 验证码错误或已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== 优惠券服务 ====================
  /api/coupon/list:
    get:
      tags:
        - 优惠券服务
      summary: 获取优惠券列表
      description: |
        获取可领取的优惠券列表。
      operationId: getCouponList
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Coupon'

  /api/coupon/my:
    get:
      tags:
        - 优惠券服务
      summary: 获取我的优惠券
      description: |
        获取当前用户已领取的优惠券。
      operationId: getMyCoupons
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          description: 状态（1-未使用，2-已使用，3-已过期）
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  data:
                    type: array
                    items:
                      type: object
        '401':
          description: 未认证

  /api/coupon/receive/{couponId}:
    post:
      tags:
        - 优惠券服务
      summary: 领取优惠券
      description: |
        用户领取指定优惠券。
      operationId: receiveCoupon
      security:
        - BearerAuth: []
      parameters:
        - name: couponId
          in: path
          description: 优惠券ID
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: 领取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: 领取失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/coupon/available:
    get:
      tags:
        - 优惠券服务
      summary: 获取可用优惠券
      description: |
        获取当前用户可用于下单的优惠券。
      operationId: getAvailableCoupons
      security:
        - BearerAuth: []
      parameters:
        - name: merchantId
          in: query
          description: 商户ID
          required: false
          schema:
            type: integer
        - name: orderAmount
          in: query
          description: 订单金额
          required: false
          schema:
            type: number
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                type: object

  # ==================== 消息通知服务 ====================
  /api/notification:
    get:
      tags:
        - 消息通知服务
      summary: 获取消息列表
      description: |
        获取当前用户的通知消息列表。
      operationId: getNotifications
      security:
        - BearerAuth: []
      parameters:
        - name: isRead
          in: query
          description: 已读状态（0-未读，1-已读）
          required: false
          schema:
            type: integer
        - name: page
          in: query
          description: 页码
          required: false
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          description: 每页数量
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                type: object
        '401':
          description: 未认证

  /api/notification/unread-count:
    get:
      tags:
        - 消息通知服务
      summary: 获取未读消息数量
      description: |
        获取当前用户未读消息的数量。
      operationId: getUnreadCount
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  data:
                    type: integer
                    description: 未读数量
                    example: 5

  /api/notification/{notificationId}/read:
    put:
      tags:
        - 消息通知服务
      summary: 标记消息为已读
      description: |
        将指定消息标记为已读状态。
      operationId: markAsRead
      security:
        - BearerAuth: []
      parameters:
        - name: notificationId
          in: path
          description: 消息ID
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/notification/read-all:
    put:
      tags:
        - 消息通知服务
      summary: 标记全部消息为已读
      description: |
        将所有未读消息标记为已读状态。
      operationId: markAllAsRead
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/auth/me:
    get:
      tags:
        - 认证服务
      summary: 获取当前用户信息
      description: 获取当前登录用户的详细信息
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/check:
    get:
      tags:
        - 认证服务
      summary: 检查登录状态
      description: 检查当前用户是否已登录
      operationId: checkLogin
      responses:
        '200':
          description: 检查成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      isLogin:
                        type: boolean
                        example: true
                      userId:
                        type: integer
                        example: 1

  # ==================== 用户服务 ====================
  /api/user/profile:
    get:
      tags:
        - 用户服务
      summary: 获取用户资料
      description: 获取当前用户的个人资料
      operationId: getUserProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    put:
      tags:
        - 用户服务
      summary: 更新用户资料
      description: 更新当前用户的个人资料
      operationId: updateUserProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                  description: 昵称
                  example: "新昵称"
                gender:
                  type: integer
                  description: 性别，0-未知 1-男 2-女
                  example: 1
                avatar:
                  type: string
                  description: 头像URL
                  example: "https://example.com/avatar.jpg"
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/user/info:
    get:
      tags:
        - 用户服务
      summary: 获取用户信息
      description: 获取当前用户的详细信息
      operationId: getUserInfo
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/user/password:
    put:
      tags:
        - 用户服务
      summary: 修改密码
      description: 修改当前用户的密码
      operationId: changePassword
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - oldPassword
                - newPassword
              properties:
                oldPassword:
                  type: string
                  description: 原密码
                  example: "123456"
                newPassword:
                  type: string
                  description: 新密码
                  example: "newpassword123"
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
