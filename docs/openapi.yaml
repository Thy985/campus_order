components:
  schemas:
    # ==================== 通用响应 ====================
    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          nullable: true
        timestamp:
          type: integer
          format: int64
          example: 1704067200000

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: 请求参数错误
        data:
          type: object
          nullable: true
        timestamp:
          type: integer
          format: int64
          example: 1704067200000

    # ==================== 用户相关 ====================
    RegisterRequest:
      type: object
      required:
        - phone
        - password
        - verifyCode
      properties:
        phone:
          type: string
          description: 手机号
          example: "13800138000"
          pattern: '^1[3-9]\d{9}$'
        password:
          type: string
          description: 密码
          example: "123456"
          minLength: 6
        nickname:
          type: string
          description: 昵称
          example: "张三"
        verifyCode:
          type: string
          description: 验证码
          example: "123456"

    LoginRequest:
      type: object
      required:
        - phone
        - password
      properties:
        phone:
          type: string
          description: 手机号
          example: "13800138000"
        password:
          type: string
          description: 密码
          example: "123456"

    LoginResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: 登录成功
        data:
          type: object
          properties:
            token:
              type: string
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            user:
              $ref: '#/components/schemas/User'
            expireTime:
              type: integer
              format: int64
              example: 86400
        timestamp:
          type: integer
          format: int64
          example: 1704067200000

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: "13800138000"
        nickname:
          type: string
          example: "张三"
        phone:
          type: string
          example: "13800138000"
        avatar:
          type: string
          example: "https://example.com/avatar.jpg"
        gender:
          type: integer
          description: 性别，0-未知 1-男 2-女
          example: 1
        userType:
          type: integer
          description: 用户类型，1-普通用户 2-商家 3-管理员
          example: 1
        merchantId:
          type: integer
          format: int64
          description: 关联的商家ID（商家用户）
          example: 1
        status:
          type: integer
          description: 状态，0-禁用 1-正常
          example: 1
        createTime:
          type: string
          format: date-time
          example: "2024-01-01T10:00:00"

    UserResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/User'
        timestamp:
          type: integer
          format: int64

    # ==================== 优惠券相关 ====================
    Coupon:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "满20减5"
        description:
          type: string
          example: "满20元可用"
        type:
          type: integer
          description: 优惠券类型，1-满减券 2-折扣券
          example: 1
        minAmount:
          type: number
          format: double
          description: 最低消费金额
          example: 20.00
        discountAmount:
          type: number
          format: double
          description: 优惠金额
          example: 5.00
        discountPercent:
          type: integer
          description: 折扣百分比（折扣券使用）
          example: 80
        startTime:
          type: string
          format: date-time
          description: 开始时间
        endTime:
          type: string
          format: date-time
          description: 结束时间
        totalCount:
          type: integer
          description: 总数量
          example: 100
        remainingCount:
          type: integer
          description: 剩余数量
          example: 50
        status:
          type: integer
          description: 状态，0-禁用 1-启用
          example: 1
        createTime:
          type: string
          format: date-time

    UserCoupon:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        couponId:
          type: integer
          format: int64
        coupon:
          $ref: '#/components/schemas/Coupon'
        status:
          type: integer
          description: 状态，1-未使用 2-已使用 3-已过期
          example: 1
        useTime:
          type: string
          format: date-time
        orderId:
          type: integer
          format: int64
        receiveTime:
          type: string
          format: date-time
        expireTime:
          type: string
          format: date-time

    # ==================== 商家相关 ====================
    Merchant:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "美味餐厅"
        logo:
          type: string
          example: "https://example.com/logo.jpg"
        banner:
          type: string
          example: "https://example.com/banner.jpg"
        categoryId:
          type: integer
          example: 1
        description:
          type: string
          example: "提供美味的中餐"
        phone:
          type: string
          example: "0571-88888888"
        address:
          type: string
          example: "学校食堂二楼"
        avgPrice:
          type: number
          format: double
          example: 15.00
        rating:
          type: number
          format: double
          example: 4.8
        salesVolume:
          type: integer
          example: 1000
        status:
          type: integer
          example: 1
        createTime:
          type: string
          format: date-time

    MerchantCategory:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "中餐"
        icon:
          type: string
          example: "https://example.com/icon.jpg"
        sortOrder:
          type: integer
          example: 1

    MerchantListResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            total:
              type: integer
              example: 50
            page:
              type: integer
              example: 1
            pageSize:
              type: integer
              example: 10
            totalPages:
              type: integer
              example: 5
            merchantList:
              type: array
              items:
                $ref: '#/components/schemas/Merchant'
        timestamp:
          type: integer
          format: int64

    MerchantDetailResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            merchant:
              $ref: '#/components/schemas/Merchant'
            category:
              $ref: '#/components/schemas/MerchantCategory'
        timestamp:
          type: integer
          format: int64

    # ==================== 商品相关 ====================
    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        merchantId:
          type: integer
          format: int64
          example: 1
        categoryId:
          type: integer
          example: 1
        name:
          type: string
          example: "宫保鸡丁盖浇饭"
        subtitle:
          type: string
          example: "经典川菜"
        image:
          type: string
          example: "https://example.com/product.jpg"
        images:
          type: array
          items:
            type: string
        description:
          type: string
          example: "选用优质鸡肉，配以花生米..."
        price:
          type: number
          format: double
          example: 12.00
        originalPrice:
          type: number
          format: double
          example: 15.00
        unit:
          type: string
          example: "份"
        stock:
          type: integer
          example: 100
        salesVolume:
          type: integer
          example: 500
        status:
          type: integer
          example: 1

    ProductCategory:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "热销推荐"
        icon:
          type: string
        sortOrder:
          type: integer
          example: 1

    ProductListResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            total:
              type: integer
              example: 50
            page:
              type: integer
              example: 1
            pageSize:
              type: integer
              example: 10
            productList:
              type: array
              items:
                $ref: '#/components/schemas/Product'
        timestamp:
          type: integer
          format: int64

    ProductDetailResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            product:
              $ref: '#/components/schemas/Product'
        timestamp:
          type: integer
          format: int64

    # ==================== 订单相关 ====================
    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        orderNo:
          type: string
          example: "ORD2024010100001"
        userId:
          type: integer
          format: int64
          example: 1
        merchantId:
          type: integer
          format: int64
          example: 1
        orderType:
          type: integer
          example: 1
        totalAmount:
          type: number
          format: double
          example: 24.00
        actualAmount:
          type: number
          format: double
          example: 24.00
        discountAmount:
          type: number
          format: double
          example: 0.00
        couponId:
          type: integer
          format: int64
          nullable: true
        status:
          type: integer
          description: 订单状态，1-待支付 2-待接单 3-制作中 4-待取餐 5-已完成 6-已取消 7-已拒绝
          example: 1
        payStatus:
          type: integer
