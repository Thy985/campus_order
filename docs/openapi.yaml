  /api/order:
    post:
      tags:
        - 订单服务
      summary: 创建订单
      description: |
        创建新订单。
        
        **测试场景**:
        - 正常创建订单
        - 空商品列表（边界条件）
        - 商品库存不足
        - 商家未营业
        
        **Apifox自动化说明**：
        此接口已配置后置操作，创建成功后会自动保存orderId和orderNo到环境变量。
      operationId: createOrder
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            example:
              merchantId: 1
              orderType: 1
              orderItems:
                - productId: 1
                  productName: "宫保鸡丁盖浇饭"
                  productPrice: 12.00
                  quantity: 2
              deliveryAddress: "学生宿舍1栋101"
              contactPhone: "13800138000"
              contactName: "张三"
              remark: "少放辣椒"
      responses:
        '200':
          description: 订单创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emptyItems:
                  summary: 商品列表为空
                  value:
                    code: 400
                    message: "订单商品不能为空"
                    data: null
                    timestamp: 1704067200000
                insufficientStock:
                  summary: 库存不足
                  value:
                    code: 400
      x-apifox:
        afterScript: |
          // 创建订单成功后保存订单信息
          const response = pm.response.json();
          if (response.code === 200 && response.data) {
            const orderData = response.data;
            if (orderData.id) {
              pm.environment.set("orderId", orderData.id.toString());
              console.log("✅ orderId已保存: " + orderData.id);
            }
            if (orderData.orderNo) {
              pm.environment.set("orderNo", orderData.orderNo);
              console.log("✅ orderNo已保存: " + orderData.orderNo);
            }
          }
                    message: "商品库存不足"
                    data: null
                    timestamp: 1704067200000

