<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园点餐系统</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 校园点餐系统</h1>
        <p>请先构建前端项目并将 dist 目录复制到 static 目录</p>
        <p>运行: cd front/app && npm run build</p>
        <p>复制: cp -r dist/* ../../../backend/src/main/resources/static/</p>
    </div>
</body>
</html>
