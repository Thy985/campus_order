# 短信服务配置示例
# 将此配置添加到 application.yaml 或 application-dev.yaml 中

# ========== 短信服务配置 ==========
sms:
  # 短信服务提供商: mock(模拟), aliyun(阿里云), tencent(腾讯云)
  provider: mock
  
  # 是否启用短信服务
  enabled: true
  
  # 短信签名(需要在短信服务商平台申请)
  sign-name: 校园点餐
  
  # AccessKey ID(阿里云/腾讯云)
  access-key-id: your_access_key_id
  
  # AccessKey Secret(阿里云/腾讯云)
  access-key-secret: your_access_key_secret
  
  # 阿里云短信配置
  aliyun:
    region-id: cn-hangzhou
    endpoint: dysmsapi.aliyuncs.com
  
  # 腾讯云短信配置
  tencent:
    sdk-app-id: your_sdk_app_id
    region: ap-guangzhou
  
  # 短信模板配置(需要在短信服务商平台申请模板)
  template:
    # 验证码模板ID
    verify-code: SMS_123456789
    
    # 订单超时取消模板ID
    order-timeout: SMS_123456790
    
    # 支付成功模板ID
    payment-success: SMS_123456791
    
    # 订单状态变更模板ID
    order-status-change: SMS_123456792
    
    # 新订单通知模板ID(商家)
    new-order-notify: SMS_123456793
    
    # 订单完成通知模板ID
    order-complete: SMS_123456794

# ========== 使用说明 ==========
# 
# 1. 开发环境配置(使用模拟短信服务):
#    sms:
#      provider: mock
#      enabled: true
#      sign-name: 校园点餐
#
# 2. 生产环境配置(使用阿里云短信):
#    sms:
#      provider: aliyun
#      enabled: true
#      sign-name: 校园点餐
#      access-key-id: LTAI5tXXXXXXXXXXXXXX
#      access-key-secret: xxxxxxxxxxxxxxxxxxxxx
#      template:
#        verify-code: SMS_123456789
#        order-timeout: SMS_123456790
#        payment-success: SMS_123456791
#        order-status-change: SMS_123456792
#        new-order-notify: SMS_123456793
#
# 3. 阿里云短信服务申请流程:
#    a. 登录阿里云控制台: https://dysms.console.aliyun.com/
#    b. 开通短信服务
#    c. 添加短信签名(需要企业资质或个人认证)
#    d. 添加短信模板(需要审核,通常1-2个工作日)
#    e. 获取AccessKey ID和AccessKey Secret
#    f. 配置到application.yaml中
#
# 4. 短信模板示例:
#    验证码模板: 您的验证码是: ${code},5分钟内有效,请勿泄露。
#    订单超时模板: 您的订单${orderNo}因超时未支付已自动取消,如有疑问请联系客服。
#    支付成功模板: 您的订单${orderNo}支付成功,金额${amount}元,商家正在准备中。
#    状态变更模板: 您的订单${orderNo}状态已更新为: ${status}。
#    新订单通知: 您收到新订单${orderNo},金额${amount}元,请及时处理。
#
# 5. Maven依赖(使用阿里云短信时需要添加):
#    <dependency>
#        <groupId>com.aliyun</groupId>
#        <artifactId>dysmsapi20170525</artifactId>
#        <version>2.0.24</version>
#    </dependency>
#
# 6. 费用说明:
#    - 阿里云短信: 约0.045元/条(国内短信)
#    - 腾讯云短信: 约0.045元/条(国内短信)
#    - 建议充值100元起步,可发送约2000条短信
