# ============================================
# 开发环境配置 (application-dev.yaml)
# ============================================
# 配置原则：
# 1. 启用调试功能（如Druid监控）
# 2. 使用本地或开发环境的数据库/Redis
# 3. 详细的日志输出
# 4. 宽松的限流策略
# 5. 使用测试/沙箱环境的第三方服务
# ============================================

spring:
  config:
    activate:
      on-profile: dev

  application:
    name: campus-order-dev

  # 自动初始化SQL脚本
  sql:
    init:
      mode: never  # 关闭自动初始化，使用Flyway或手动执行db目录下的SQL文件
  
  # ============================================
  # 开发环境数据源配置
  # ============================================
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus_order?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: root
    password: 123456
    druid:
      # 开发环境使用较小的连接池
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,slf4j
      # 开发环境启用Druid监控
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.bmp,*.png,*.css,*.ico,/druid/*"
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
        reset-enable: true
  
  # ============================================
  # 开发环境Redis配置
  # ============================================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:147258369Thy@}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # ============================================
  # 开发环境邮件配置
  # ============================================
  mail:
    host: ${MAIL_SMTP_HOST:smtp.qq.com}
    port: ${MAIL_SMTP_PORT:465}
    username: ${MAIL_SMTP_USERNAME:1850833838@qq.com}
    password: ${MAIL_SMTP_PASSWORD:rttorosdydawdaff}
    protocol: smtps
    properties:
      mail:
        smtp:
          ssl:
            enable: true
            required: true
          auth: true
          connection-timeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8

# ============================================
# 开发环境日志配置
# ============================================
logging:
  level:
    root: INFO
    com.xingchen.backend: DEBUG
    com.mybatisflex: DEBUG
  file:
    name: logs/campus-order-dev.log
  # 开发环境控制台彩色输出
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr([%thread]){faint} %clr(%-5level){highlight} %clr(%logger{36}){cyan} - %msg%n"

# ============================================
# 开发环境支付宝沙箱支付配置
# ============================================
alipay:
  # 应用ID
  app-id: ${ALIPAY_APP_ID:9021000161667139}
  # 应用私钥
  private-key: ${ALIPAY_PRIVATE_KEY:}
  # 支付宝公钥
  public-key: ${ALIPAY_PUBLIC_KEY:}
  # 开发环境回调地址说明：
  # 1. 本地开发测试：使用 localhost:9090（默认值）
  # 2. 需要外网访问（如支付宝沙箱回调）：使用内网穿透工具（ngrok/cpolar）
  #    示例：ngrok http 9090，然后将 https://xxx.ngrok.io/api/payment/alipay/notify 填入环境变量
  notify-url: ${ALIPAY_NOTIFY_URL:http://28f7048b.r36.cpolar.top/api/payment/alipay/notify}
  return-url: ${ALIPAY_RETURN_URL:http://28f7048b.r36.cpolar.top/api/payment/alipay/return}
  sandbox: true

# ============================================
# 开发环境文件上传配置
# ============================================
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads/dev}
  access-url: ${FILE_ACCESS_URL:http://localhost:9090/files}

# ============================================
# 开发环境限流配置（较宽松）
# ============================================
rate-limit:
  enabled: true
  default-limit: 100
  default-period: 1

# ============================================
# 开发环境Sa-Token配置
# ============================================
sa-token:
  # 开发环境Token有效期较短，方便测试
  timeout: 86400
  is-log: true


