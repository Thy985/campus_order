[pytest]
# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = test_cases

# Add markers
markers =
    smoke: Smoke tests (quick sanity checks)
    regression: Regression tests
    auth: Authentication related tests
    user: User management tests
    merchant: Merchant related tests
    product: Product related tests
    order: Order related tests
    payment: Payment related tests
    review: Review related tests
    boundary: Boundary condition tests
    error: Error handling tests
    performance: Performance tests
    security: Security tests
    slow: Slow running tests

# Test execution
addopts =
    -v
    --tb=short
    --strict-markers
    --html=reports/report.html
    --self-contained-html
    --json-report
    --json-report-file=reports/report.json
    --timeout=30

# Parallel execution (uncomment to enable)
# addopts = -n auto

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Environment variables
env =
    ENV=test
    API_BASE_URL=http://localhost:8080
    TIMEOUT=30
